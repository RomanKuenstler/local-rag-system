name: PR CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  lint-build-smoke:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Lint JavaScript sources
        run: npm run lint

      - name: Syntax lint tracked files by type
        shell: bash
        run: |
          set -euo pipefail
          files=$(git ls-files)

          js_files=$(printf "%s\n" "$files" | rg '\\.(js|mjs|cjs)$' || true)
          if [ -n "$js_files" ]; then
            while IFS= read -r file; do
              node --check "$file"
            done <<< "$js_files"
          fi

          sh_files=$(printf "%s\n" "$files" | rg '\\.sh$' || true)
          if [ -n "$sh_files" ]; then
            while IFS= read -r file; do
              bash -n "$file"
            done <<< "$sh_files"
          fi

          json_files=$(printf "%s\n" "$files" | rg '\\.json$' || true)
          if [ -n "$json_files" ]; then
            while IFS= read -r file; do
              node -e "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8'))" "$file"
            done <<< "$json_files"
          fi

      - name: Build application container
        run: docker build -t local-rag-system:ci .

      - name: Smoke test container runtime (Node starts and app entrypoint parses)
        run: |
          docker run --rm local-rag-system:ci node --version
          docker run --rm local-rag-system:ci node --check index.js
